name: CI

on:
  push:
  pull_request:
    branches: [ $default-branch ]
  release:
    types:
      - created

jobs:
  test:
    name: "Erlang Test"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        otp: [27, 28]
      fail-fast: false
    container:
      image: erlang:${{ matrix.otp }}
    steps:
    - uses: actions/checkout@v3
    - name: Test
      run: make

  docs:
    name: "Docs"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build Docs
      run: make docs
